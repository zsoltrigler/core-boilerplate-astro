<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#6366f1" />

  <!-- Badge -->
  <rect x="80" y="180" width="220" height="36" rx="18" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1" />
  <circle cx="102" cy="198" r="5" fill="#6366f1" opacity="0.8" />
  <text x="118" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#6366f1">Astro 7 · Tailwind 4</text>

  <!-- Main heading -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-2">Core Boilerplate</text>

  <!-- Subtitle -->
  <text x="80" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">A minimal, production-ready Astro starter.</text>

  <!-- Divider -->
  <rect x="80" y="400" width="60" height="3" rx="2" fill="#6366f1" />

  <!-- Stack pills -->
  <rect x="80" y="428" width="108" height="34" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="134" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">TypeScript</text>

  <rect x="200" y="428" width="108" height="34" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="254" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">Dark mode</text>

  <rect x="320" y="428" width="108" height="34" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="374" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">WCAG AA</text>

  <rect x="440" y="428" width="108" height="34" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="494" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">SEO ready</text>

  <!-- Decorative right side glow -->
  <radialGradient id="glow" cx="80%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15" />
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Bottom domain -->
  <text x="80" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#475569">github.com/zsoltrigler/core-boilerplate-astro</text>
</svg>
