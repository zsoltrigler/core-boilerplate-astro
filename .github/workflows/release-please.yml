# Release Please — automatically creates and maintains a Release PR on every
# push to main, and auto-merges it once CI passes so releases ship continuously
# with no manual step. A GitHub Release and git tag are created automatically
# and package.json version is bumped the moment the Release PR merges.
#
# How it works:
#   1. Every push to main updates the pending Release PR with new changelog entries.
#   2. This workflow enables GitHub auto-merge on that PR — it merges itself as
#      soon as the required "Type check & build" status check passes (see branch
#      protection on main), with no human click needed.
#   3. Version bump follows Conventional Commits, per release-please's own
#      default behavior (release-please-config.json has no changelog-sections
#      override — do not add one; a custom list that includes chore/docs/style
#      types has been observed to make them ALSO bump the version, which
#      contradicts the documented spec that only feat/fix/deps are releasable
#      units — see https://github.com/googleapis/release-please/issues/2638):
#        feat:  → minor (1.0.0 → 1.1.0)
#        fix:   → patch (1.0.0 → 1.0.1)
#        feat!: → major (1.0.0 → 2.0.0)
#        chore/refactor/docs/style → recorded, but does not bump the version
#          on its own — only rides along in the changelog if bundled with a
#          feat/fix in the same release
#
# ! Requires a RELEASE_PLEASE_TOKEN repo secret (a PAT with Contents + Pull
#   requests write access). PRs opened AND merged with the default GITHUB_TOKEN
#   do not trigger other workflows (incl. the "Type check & build" CI check this
#   auto-merge waits on, and — just as importantly — the next Release Please run
#   that actually creates the GitHub Release/tag once the release commit lands
#   on main) — see https://github.com/googleapis/release-please-action#other-actions-on-release-please-prs.
#   Without it, both the required check and the follow-up tagging run never fire.

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # * Requires branch protection on main with "Type check & build" as a
      #   required status check, and allow_auto_merge enabled on the repo —
      #   otherwise this merges immediately without waiting for CI.
      # ! --repo is required — this job never checks out the git repo (release-please
      #   operates purely via the GitHub API), so `gh` has no local git remote to
      #   infer the repo from and fails with "not a git repository" without it.
      # ! GH_TOKEN must be the PAT, not github.token — a merge performed with the
      #   default token doesn't trigger the next push-to-main run, so the release
      #   commit lands but the GitHub Release/tag never gets created.
      # ! Deliberately NOT gated on steps.release.outputs.prs_created — that output
      #   is only 'true' the moment a release PR is first opened from scratch. Every
      #   subsequent push that just updates the SAME still-open release PR (the
      #   common case — most releases bundle several merged PRs) reports
      #   prs_created: false, which silently skipped this step entirely and left
      #   auto-merge never enabled. Instead, always look up whatever PR currently
      #   sits on the release-please branch and (re-)enable auto-merge on it —
      #   idempotent if it's already enabled, and self-healing if a push race or
      #   manual intervention ever clears it.
      # ! --squash, not --merge — the repo only allows squash merges (see
      #   ~/.claude/CLAUDE.md core-boilerplate section: no staging branch, so
      #   merge commits would duplicate conventional-commit text in the
      #   changelog). --merge fails outright once merge commits are disabled
      #   on the repo.
      - name: Enable auto-merge for the release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          pr_number=$(gh pr list --repo "${{ github.repository }}" \
            --head "release-please--branches--main--components--core-boilerplate" \
            --json number --jq '.[0].number')
          if [ -n "$pr_number" ]; then
            gh pr merge --auto --squash --repo "${{ github.repository }}" "$pr_number"
          fi
