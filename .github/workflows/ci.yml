# CI pipeline — runs on every push and pull request targeting main.
# Installs dependencies, lints, type-checks, builds, and runs Lighthouse CI.
# Any failing step blocks the PR from being merged.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type check & build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # * Version is read automatically from packageManager field in package.json
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec astro check

      - name: Build
        run: pnpm build

      - name: Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
